name: Build Mandir APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: cd mandir-app && npm install

      - name: Add Android platform
        run: cd mandir-app && npx cap add android || true

      - name: Sync Capacitor
        run: cd mandir-app && npx cap sync android

      - name: Make gradlew executable
        run: chmod +x mandir-app/android/gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: cd mandir-app/android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mandir-receipts-apk
          path: mandir-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
